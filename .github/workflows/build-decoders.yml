# Builds the Windows native binaries the installer bundles, under MSYS2, so no
# local toolchain is needed: the VDL2 decoder (dumpvdl2.exe) and the silent
# WinUSB driver installer (wdi-simple.exe, from libwdi — Zadig's engine).
# Each job uploads an artifact and, on a tag, a release asset.
name: build-decoders

on:
  workflow_dispatch:      # run on demand from the Actions tab
  push:
    tags: ['decoders-*', 'v*']

jobs:
  dumpvdl2-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-jansson

      - name: Build libacars
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/szpajder/libacars /tmp/libacars
          cmake -S /tmp/libacars -B /tmp/libacars/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/mingw64
          cmake --build /tmp/libacars/build
          cmake --install /tmp/libacars/build

      - name: Build dumpvdl2 (RTL-SDR only, extras off)
        run: |
          set -euxo pipefail
          PATCH="$(pwd)/installer/patches/dumpvdl2-windows.patch"
          git clone --depth 1 https://github.com/szpajder/dumpvdl2 /tmp/dumpvdl2
          # Port to Windows: POSIX signals + strsep/strndup shim, Winsock UDP output.
          git -C /tmp/dumpvdl2 apply --ignore-whitespace --verbose "$PATCH"
          cmake -S /tmp/dumpvdl2 -B /tmp/dumpvdl2/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DRTLSDR=ON -DSOAPYSDR=OFF -DMIRISDR=OFF -DSDRPLAY=OFF -DSDRPLAY3=OFF \
            -DSQLITE=OFF -DZMQ=OFF -DETSY_STATSD=OFF -DRAW_BINARY_FORMAT=OFF
          cmake --build /tmp/dumpvdl2/build
          test -f /tmp/dumpvdl2/build/src/dumpvdl2.exe

      - name: Bundle exe + runtime DLLs
        run: |
          set -euxo pipefail
          mkdir -p dist/dumpvdl2-windows-amd64
          cp /tmp/dumpvdl2/build/src/dumpvdl2.exe dist/dumpvdl2-windows-amd64/
          # copy every mingw64 DLL the exe transitively needs
          ldd /tmp/dumpvdl2/build/src/dumpvdl2.exe \
            | awk '/\/mingw64\/bin\// {print $3}' \
            | while read -r dll; do cp -v "$dll" dist/dumpvdl2-windows-amd64/; done
          # sanity: version banner runs against the bundled DLLs
          cd dist/dumpvdl2-windows-amd64 && ./dumpvdl2.exe --version || true
          cd - >/dev/null
          ls -la dist/dumpvdl2-windows-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dumpvdl2-windows-amd64
          path: dist/dumpvdl2-windows-amd64
          if-no-files-found: error

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euxo pipefail
          cd dist && 7z a dumpvdl2-windows-amd64.zip dumpvdl2-windows-amd64 >/dev/null
          gh release upload "${GITHUB_REF_NAME}" dumpvdl2-windows-amd64.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash

  # Silent WinUSB driver installer (wdi-simple.exe from libwdi — Zadig's engine).
  # Built from source with the libwdi author's own mingw recipe: the WDK 8.0
  # *redistributable* (a downloadable msi, not a full WDK install) supplies the
  # driver co-installers, so no local WDK — which is what broke the earlier try.
  wdi-simple-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Set up MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            autotools
            mingw-w64-x86_64-toolchain

      - name: Fetch libwdi + WDK redistributable
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/pbatard/libwdi
          cd libwdi
          curl -L "https://go.microsoft.com/fwlink/p/?LinkID=253170" -o wdk-redist.msi
          msiexec /a wdk-redist.msi /qn TARGETDIR=%CD%\wdk

      - name: Build wdi-simple.exe (WinUSB only)
        run: |
          set -euxo pipefail
          cd libwdi
          ./bootstrap.sh
          # We only install WinUSB (--type 0); skip the libusb0/libusbK backends.
          ./configure --build=x86_64-w64-mingw32 --host=x86_64-w64-mingw32 \
            --enable-toggable-debug --enable-examples-build --disable-debug --disable-shared --disable-32bit \
            --with-wdkdir="wdk/Windows Kits/8.0" --with-wdfver=1011
          make
          mkdir -p ../dist/wdi-simple-windows-amd64
          cp examples/wdi-simple.exe ../dist/wdi-simple-windows-amd64/
          ldd examples/wdi-simple.exe \
            | awk '/\/mingw64\/bin\// {print $3}' \
            | while read -r dll; do cp -v "$dll" ../dist/wdi-simple-windows-amd64/; done
          ls -la ../dist/wdi-simple-windows-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wdi-simple-windows-amd64
          path: dist/wdi-simple-windows-amd64
          if-no-files-found: error

  # ADS-B (1090) decoder with BEAST output (--net-beast :30005 -> forwarder ->
  # feed.adsbiq.com:30004). MalcolmRobb/dump1090 is Windows-aware (#ifndef _WIN32)
  # and Beast-capable; built under MSYS2 like the VDL2 decoder.
  dump1090-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4   # for installer/patches/dump1090-mingw.patch

      - name: Set up MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-libusb

      - name: Build MalcolmRobb/dump1090 (Beast, RTL-SDR)
        run: |
          set -euxo pipefail
          PATCH="$(pwd)/installer/patches/dump1090-mingw.patch"
          git clone --depth 1 https://github.com/MalcolmRobb/dump1090 /tmp/dump1090
          # winstubs.h redefines types modern mingw provides — guard them to MSVC.
          git -C /tmp/dump1090 apply --ignore-whitespace --verbose "$PATCH"
          cd /tmp/dump1090
          # Link Winsock for the _WIN32 network code.
          make dump1090 \
               CFLAGS="$(pkg-config --cflags librtlsdr) -DMISSING_GETTIMEOFDAY -Wno-error=incompatible-pointer-types -Wno-incompatible-pointer-types -Wno-error=int-conversion -fcommon" \
               LIBS="$(pkg-config --libs librtlsdr) -lws2_32 -lpthread" || make
          test -f dump1090.exe

      - name: Bundle exe + runtime DLLs
        run: |
          set -euxo pipefail
          mkdir -p dist/dump1090-windows-amd64
          cp /tmp/dump1090/dump1090.exe dist/dump1090-windows-amd64/
          ldd /tmp/dump1090/dump1090.exe \
            | awk '/\/mingw64\/bin\// {print $3}' \
            | while read -r dll; do cp -v "$dll" dist/dump1090-windows-amd64/; done
          ls -la dist/dump1090-windows-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dump1090-windows-amd64
          path: dist/dump1090-windows-amd64
          if-no-files-found: error

  # Full ADS-B decoder for the 978 path (opt-in Enable978): readsb is a dump1090 superset
  # that MERGES 978 UAT (pulled from dump978 via a uat_in connector) into its Beast stream,
  # and also emits tar1090 JSON. Native Windows via a winsock port (the patch adds a wepoll
  # epoll shim, winsock socket ops, and POSIX signal/priority/time shims).
  readsb-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4   # for installer/patches/readsb-windows.patch

      - name: Set up MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd

      - name: Build wiedehopf/readsb (winsock port)
        run: |
          set -euxo pipefail
          PATCH="$(pwd)/installer/patches/readsb-windows.patch"
          git clone --depth 1 https://github.com/wiedehopf/readsb /tmp/readsb
          git -C /tmp/readsb apply --ignore-whitespace --verbose "$PATCH"
          make -C /tmp/readsb RTLSDR=yes   # MINGW branch: DISABLE_INTERACTIVE, wepoll, -lws2_32
          test -f /tmp/readsb/readsb.exe

      - name: Bundle exe + runtime DLLs
        run: |
          set -euxo pipefail
          mkdir -p dist/readsb-windows-amd64
          cp /tmp/readsb/readsb.exe dist/readsb-windows-amd64/
          ldd /tmp/readsb/readsb.exe \
            | awk '/\/mingw64\/bin\// {print $3}' \
            | while read -r dll; do cp -v "$dll" dist/readsb-windows-amd64/; done
          cd dist/readsb-windows-amd64 && ./readsb.exe --version || true
          cd - >/dev/null; ls -la dist/readsb-windows-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: readsb-windows-amd64
          path: dist/readsb-windows-amd64
          if-no-files-found: error

  # 978 MHz UAT demodulator (dump978-fa). Cross-platform (boost::asio + SoapySDR), so only
  # a few _WIN32 guards are needed (the patch drops the POSIX stdin/stratux sources, swaps
  # boost::regex->std::regex, and path.native()->.string()). SoapySDR loads its RTL-SDR
  # plugin at runtime (dlopen), so we bundle that module too under soapymodules/.
  dump978-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4   # for installer/patches/dump978-windows.patch

      - name: Set up MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-soapysdr
            mingw-w64-x86_64-soapyrtlsdr
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-libusb

      - name: Build flightaware/dump978 (boost + SoapySDR)
        run: |
          set -euxo pipefail
          PATCH="$(pwd)/installer/patches/dump978-windows.patch"
          git clone --depth 1 https://github.com/flightaware/dump978 /tmp/dump978
          git -C /tmp/dump978 apply --ignore-whitespace --verbose "$PATCH"
          make -C /tmp/dump978 dump978-fa \
               CPPFLAGS=-D_USE_MATH_DEFINES \
               LIBS='-lboost_program_options-mt -lboost_filesystem-mt -lpthread -lstdc++ -lm -lws2_32 -lmswsock'
          test -f /tmp/dump978/dump978-fa.exe

      - name: Bundle exe + DLLs + SoapyRTLSDR plugin
        run: |
          set -euxo pipefail
          mkdir -p dist/dump978-windows-amd64/soapymodules
          cp /tmp/dump978/dump978-fa.exe dist/dump978-windows-amd64/
          ldd /tmp/dump978/dump978-fa.exe \
            | awk '/\/mingw64\/bin\// {print $3}' \
            | while read -r dll; do cp -v "$dll" dist/dump978-windows-amd64/; done
          # the RTL-SDR SoapySDR module is dlopen'd at runtime (not in ldd) — bundle it +
          # any of its own mingw DLLs. The agent sets SOAPY_SDR_PLUGIN_PATH to soapymodules/.
          MOD="$(find /mingw64/lib/SoapySDR -iname '*rtlsdr*' | head -1)"
          cp -v "$MOD" dist/dump978-windows-amd64/soapymodules/
          ldd "$MOD" | awk '/\/mingw64\/bin\// {print $3}' \
            | while read -r dll; do cp -vn "$dll" dist/dump978-windows-amd64/; done
          ls -la dist/dump978-windows-amd64 dist/dump978-windows-amd64/soapymodules

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dump978-windows-amd64
          path: dist/dump978-windows-amd64
          if-no-files-found: error

  # Assemble everything + compile the one-click Flightpatch installer (unsigned).
  build-installer:
    needs: [dumpvdl2-windows, wdi-simple-windows, dump1090-windows, readsb-windows, dump978-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the agent (Go, windows/amd64)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p installer/dist/decoders installer/dist/driver installer/dist/service
          (cd agent && GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../installer/dist/adsbiq-feed-agent.exe .)

      - name: Download decoder + driver artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble dist/
        shell: bash
        run: |
          set -euxo pipefail
          cp artifacts/dumpvdl2-windows-amd64/* installer/dist/decoders/
          cp artifacts/dump1090-windows-amd64/*  installer/dist/decoders/
          cp    artifacts/readsb-windows-amd64/*  installer/dist/decoders/
          cp -r artifacts/dump978-windows-amd64/* installer/dist/decoders/   # includes soapymodules/
          cp artifacts/wdi-simple-windows-amd64/* installer/dist/driver/
          # WinSW service host (stable v2, .NET Framework 4.x present on Win10/11)
          curl -fL -o installer/dist/service/WinSW.exe \
            https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe
          ls -R installer/dist

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\flightpatch.iss
          Get-ChildItem installer\out

      - name: Upload setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: flightpatch-setup-unsigned
          path: installer/out/*.exe
          if-no-files-found: error
